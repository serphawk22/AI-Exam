[phases.setup]
# System-level libraries needed by OpenCV, dlib, WeasyPrint, ffmpeg
nixPkgs = [
  "libGL",
  "libglib",
  "libsm",
  "libxrender",
  "libxext",
  "ffmpeg",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "cmake"
]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "mkdir -p proctoring/ml_models",
  "wget -q -O proctoring/ml_models/yolo11s.pt https://github.com/ultralytics/assets/releases/download/v8.3.0/yolo11s.pt || echo 'YOLO download skipped'",
  "DJANGO_SETTINGS_MODULE=futurproctor.settings_production python manage.py collectstatic --noinput",
  "DJANGO_SETTINGS_MODULE=futurproctor.settings_production python manage.py migrate --noinput"
]

[start]
cmd = "DJANGO_SETTINGS_MODULE=futurproctor.settings_production gunicorn futurproctor.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
