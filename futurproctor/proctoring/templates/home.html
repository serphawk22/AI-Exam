{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FutureProctor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="{% static 'images/monitor_logo.png' %}" alt="FutureProctor Logo" style="height:40px;">
            </a>

            <div class="ms-auto">
                <a class="btn btn-primary me-2" href="{% url 'login' %}">Login</a>
                <a class="btn btn-secondary" href="{% url 'registration' %}">Register</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section py-5">
        <div class="container">
            <div class="row align-items-center">

                <div class="col-lg-6">
                    <h1 class="display-5 fw-bold">
                        AI-Based Online Exam
                    </h1>
                    <p class="lead mt-3">
                        Secure, intelligent and automated proctoring powered by Artificial Intelligence.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg mt-3">
                        Get Started
                    </a>
                </div>

                <div class="col-lg-6 text-center">
                    <img src="{% static 'images/ai-procotor.png' %}" alt="AI Proctor Dashboard" class="img-fluid"
                        style="max-height:400px;">
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
