<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Interview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #0d0d1a;
            color: #e8e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        /* ─── CAMERA FEED (top-right) ─── */
        #userCamera {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            height: 130px;
            border: 2px solid #22c55e;
            border-radius: 12px;
            object-fit: cover;
            z-index: 999;
            background: #000;
        }

        /* ─── TIMER (top-left) ─── */
        #timerBox {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4ade80;
            border-radius: 12px;
            padding: 8px 18px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #4ade80;
            z-index: 999;
            letter-spacing: 3px;
        }

        #timerBox.warn {
            border-color: #fb923c;
            color: #fb923c;
        }

        #timerBox.crit {
            border-color: #ef4444;
            color: #ef4444;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        /* ─── MAIN CONTENT ─── */
        .main {
            max-width: 820px;
            margin: 0 auto;
            padding: 90px 20px 40px;
            text-align: center;
        }

        /* ─── AI AVATAR ─── */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            margin: 0 auto 28px;
            box-shadow: 0 0 40px #6366f155;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }
        }

        .avatar.speaking {
            box-shadow: 0 0 60px #22d3ee88;
            animation: pulse-ring 0.8s ease-in-out infinite;
        }

        @keyframes pulse-ring {

            0%,
            100% {
                box-shadow: 0 0 20px #22d3ee55
            }

            50% {
                box-shadow: 0 0 70px #22d3eeaa
            }
        }

        /* ─── AI QUESTION TEXT ─── */
        #aiText {
            font-size: 1.35rem;
            font-weight: 500;
            line-height: 1.7;
            color: #e2e8f0;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 20px 28px;
            margin-bottom: 18px;
            min-height: 80px;
            transition: opacity 0.3s;
        }

        /* ─── USER TRANSCRIPT ─── */
        #userText {
            font-size: 1rem;
            color: #94a3b8;
            font-style: italic;
            min-height: 40px;
            margin-bottom: 28px;
            transition: color 0.3s;
        }

        #userText.active {
            color: #a78bfa;
            font-style: normal;
        }

        /* ─── STATUS ─── */
        #status {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 20px;
            height: 20px;
        }

        /* ─── MIC BUTTON ─── */
        .mic-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }

        #micBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            border: 3px solid #4f46e5;
            background: #1e1b4b;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #micBtn:hover:not(:disabled) {
            transform: scale(1.08);
            background: #312e81;
        }

        #micBtn.recording {
            background: #7f1d1d;
            border-color: #ef4444;
            animation: rec-pulse 1s ease-in-out infinite;
        }

        #micBtn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        @keyframes rec-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 #ef444466
            }

            50% {
                box-shadow: 0 0 0 14px #ef444400
            }
        }

        /* ─── HINT TEXT ─── */
        .hint {
            font-size: 0.78rem;
            color: #475569;
        }
    </style>
</head>

<body>

    <div id="timerBox">20:00</div>
    <video id="userCamera" autoplay muted playsinline></video>
    <audio id="aiAudio"></audio>

    <div class="main">
        <div class="avatar" id="avatar">🤖</div>

        <div id="aiText">Connecting to your interviewer...</div>
        <div id="userText">(Your answer will show here as you speak)</div>
        <div id="status">Initialising...</div>

        <div class="mic-wrap">
            <button id="micBtn" disabled title="Hold to speak / click to toggle">🎤</button>
        </div>
        <p class="hint">Click 🎤 to start • Click again (or stop speaking) to submit</p>
        <button id="endBtn" class="btn btn-outline-danger mt-4 px-4 py-2" style="border-radius: 8px; font-weight: 600;"
            onclick="if(confirm('Are you sure you want to end the interview early?')) window.location.href=END_URL;">End
            Interview</button>
    </div>

    <script>
        // ─────────────────────────────────────────────────
        //  CONFIG & REFS
        // ─────────────────────────────────────────────────
        const SESSION_ID = "{{ session.id }}";
        const END_URL = "/round2/end/" + SESSION_ID + "/";
        const PROC_URL = '{% url "round2_process_audio" %}';

        const micBtn = document.getElementById('micBtn');
        const aiText = document.getElementById('aiText');
        const userText = document.getElementById('userText');
        const statusEl = document.getElementById('status');
        const aiAudio = document.getElementById('aiAudio');
        const avatar = document.getElementById('avatar');
        const timerBox = document.getElementById('timerBox');
        const camera = document.getElementById('userCamera');

        let recognising = false;
        let transcript = '';
        let silenceTimer = null;
        const SILENCE_MS = 2000;  // 2 s of no new words → auto-submit

        // ─────────────────────────────────────────────────
        //  CSRF
        // ─────────────────────────────────────────────────
        function getCookie(name) {
            let v = null;
            document.cookie.split(';').forEach(c => {
                c = c.trim();
                if (c.startsWith(name + '=')) v = decodeURIComponent(c.slice(name.length + 1));
            });
            return v;
        }

        // ─────────────────────────────────────────────────
        //  CAMERA
        // ─────────────────────────────────────────────────
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(s => { camera.srcObject = s; })
            .catch(() => setStatus('⚠️ Camera/mic denied — audio will still work'));

        // ─────────────────────────────────────────────────
        //  COUNTDOWN TIMER  (20 min)
        // ─────────────────────────────────────────────────
        let timeLeft = 20 * 60;
        function tick() {
            const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            const s = String(timeLeft % 60).padStart(2, '0');
            timerBox.textContent = m + ':' + s;
            timerBox.className = timeLeft <= 60 ? 'crit' : timeLeft <= 300 ? 'warn' : '';
            if (timeLeft-- <= 0) { window.location.href = END_URL; return; }
        }
        tick();
        setInterval(tick, 1000);

        // ─────────────────────────────────────────────────
        //  INITIAL AI QUESTION  (from Django context)
        // ─────────────────────────────────────────────────
        {% if session.questions.last %}
        aiText.textContent = "{{ session.questions.last.question_text|escapejs }}";
        {% if session.questions.last.audio_url %}
        (function () {
            const url = "{{ session.questions.last.audio_url.url }}";
            if (!url) return;
            playAI(url, () => { enableMic(); setStatus('Click 🎤 then speak your answer'); });
        })();
        {% else %}
        enableMic();
        setStatus('Click 🎤 then speak your answer');
        {% endif %}
        {% else %}
        setStatus('Waiting for first question...');
        {% endif %}

        // ─────────────────────────────────────────────────
        //  MEDIA RECORDER (Robust Audio Capture)
        // ─────────────────────────────────────────────────
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // Initialize MediaRecorder stream
        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    sendToBackend(audioBlob);
                    audioChunks = []; // reset for next time
                };
            })
            .catch(err => {
                console.error('Microphone access denied:', err);
                setStatus('⚠️ Microphone access denied. Please allow mic usage.');
            });

        // ─────────────────────────────────────────────────
        //  MIC BUTTON (Click to start, Click to stop/send)
        // ─────────────────────────────────────────────────
        micBtn.addEventListener('click', () => {
            if (!mediaRecorder) {
                alert("Microphone not initialized. Please refresh and allow permissions.");
                return;
            }

            if (isRecording) {
                // STOP RECORDING & SUBMIT
                isRecording = false;
                mediaRecorder.stop(); // Triggers onstop -> sendToBackend

                micBtn.disabled = true;
                micBtn.classList.remove('recording');
                micBtn.textContent = '⏳';
                userText.textContent = 'Uploading secure audio...';
                userText.classList.remove('active');
                setStatus('Processing your answer securely...');
                aiText.style.opacity = '1';
                clearSilenceTimer();
            } else {
                // START RECORDING
                isRecording = true;
                audioChunks = [];
                mediaRecorder.start();

                micBtn.classList.add('recording');
                micBtn.textContent = '⏹️';
                userText.textContent = '🎙️ Recording... Click ⏹️ to submit.';
                userText.classList.add('active');
                aiText.style.opacity = '0.5';
                setStatus('Listening... Please speak your answer.');

                // Auto-stop if user talks for max 3 minutes just in case
                clearSilenceTimer();
                silenceTimer = setTimeout(() => {
                    if (isRecording) micBtn.click();
                }, 3 * 60 * 1000);
            }
        });

        // ─────────────────────────────────────────────────
        //  SEND TO BACKEND
        // ─────────────────────────────────────────────────
        async function sendToBackend(audioBlob) {
            const fd = new FormData();
            fd.append('session_id', SESSION_ID);
            fd.append('audio_data', audioBlob, 'answer.webm');

            try {
                const res = await fetch(PROC_URL, {
                    method: 'POST',
                    body: fd,
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await res.json();
                console.log('[server]', data);

                if (data.status === 'completed') {
                    aiText.textContent = data.message || 'Thank you! Interview complete.';
                    setStatus('🎉 Interview finished!');
                    micBtn.disabled = true;
                    micBtn.textContent = '✅';
                    return;
                }

                if (data.status === 'success') {
                    userText.textContent = 'You said: "' + (data.transcript || '(Audio sent)') + '"';
                    aiText.textContent = data.next_question_text;
                    setStatus('AI is speaking...');
                    avatar.classList.add('speaking');
                    playAI(data.next_question_audio, () => {
                        avatar.classList.remove('speaking');
                        setStatus('Click 🎤 then speak your answer');
                        enableMic();
                    });
                } else {
                    setStatus('Error: ' + (data.error || 'Unknown error'));
                    enableMic();
                }

            } catch (err) {
                console.error('[server] Network error:', err);
                setStatus('Network error — please try again');
                enableMic();
            }
        }

        // ─────────────────────────────────────────────────
        //  AUDIO PLAYBACK
        // ─────────────────────────────────────────────────
        function playAI(url, onDone) {
            aiAudio.src = url;
            const p = aiAudio.play();
            if (p) {
                p.then(() => {
                    aiAudio.onended = () => { if (onDone) onDone(); };
                }).catch(e => {
                    console.warn('[audio] Blocked, waiting for click:', e);
                    setStatus('Click anywhere to hear the AI response');
                    document.body.addEventListener('click', () => {
                        aiAudio.play();
                        aiAudio.onended = () => { if (onDone) onDone(); };
                    }, { once: true });
                });
            } else {
                aiAudio.onended = () => { if (onDone) onDone(); };
            }
        }

        // ─────────────────────────────────────────────────
        //  HELPERS
        // ─────────────────────────────────────────────────
        function enableMic() {
            micBtn.disabled = false;
            micBtn.classList.remove('recording');
            micBtn.textContent = '🎤';
            userText.classList.remove('active');
        }
        function resetMic() {
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            clearSilenceTimer();
            enableMic();
        }
        function clearSilenceTimer() {
            if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        }
        function setStatus(msg) { statusEl.textContent = msg; }
    </script>

</body>

</html>
